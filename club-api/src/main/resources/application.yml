# Конфигурация Spring Boot для club-api.

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clubdb}
    username: ${SPRING_DATASOURCE_USERNAME:club}
    password: ${SPRING_DATASOURCE_PASSWORD:club}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
  jackson:
    time-zone: ${APP_TIMEZONE:Europe/Moscow}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.wargameclub.clubapi.messaging

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  timezone: ${APP_TIMEZONE:Europe/Moscow}
  security:
    api-key: ${API_KEY:}
  loyalty:
    points-army-used: ${LOYALTY_POINTS_ARMY_USED:10}
    points-army-shared: ${LOYALTY_POINTS_ARMY_SHARED:5}
  notifications:
    max-attempts: ${NOTIFICATIONS_MAX_ATTEMPTS:5}
    backoff-seconds: ${NOTIFICATIONS_BACKOFF_SECONDS:30}
  booking:
    open-cleanup-cron: '${BOOKING_OPEN_CLEANUP_CRON:0 */5 * * * *}'
  analytics:
    file: ${ANALYTICS_FILE:}

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

lab:
  resilience:
    payment:
      mode: ${LAB_PAYMENT_MODE:NORMAL}
      slow-delay-ms: ${LAB_PAYMENT_SLOW_DELAY_MS:5000}
      error-probability: ${LAB_PAYMENT_ERROR_PROBABILITY:0.5}
    notification:
      mode: ${LAB_NOTIFICATION_MODE:NORMAL}
      slow-delay-ms: ${LAB_NOTIFICATION_SLOW_DELAY_MS:5000}
      error-probability: ${LAB_NOTIFICATION_ERROR_PROBABILITY:0.5}
    timeout:
      timeout-ms: ${LAB_PAYMENT_TIMEOUT_MS:2000}
    retry:
      max-attempts: ${LAB_PAYMENT_RETRY_MAX_ATTEMPTS:3}
      initial-delay-ms: ${LAB_PAYMENT_RETRY_INITIAL_DELAY_MS:100}
      multiplier: ${LAB_PAYMENT_RETRY_MULTIPLIER:2}
    circuit-breaker:
      failure-rate-threshold: ${LAB_CIRCUIT_FAILURE_RATE_THRESHOLD:50}
      sliding-window-size: ${LAB_CIRCUIT_SLIDING_WINDOW_SIZE:10}
      minimum-number-of-calls: ${LAB_CIRCUIT_MINIMUM_NUMBER_OF_CALLS:5}
      open-state-duration-ms: ${LAB_CIRCUIT_OPEN_STATE_DURATION_MS:10000}
      half-open-permitted-calls: ${LAB_CIRCUIT_HALF_OPEN_PERMITTED_CALLS:5}
    bulkhead:
      max-concurrent-calls: ${LAB_NOTIFICATION_BULKHEAD_MAX_CONCURRENT_CALLS:2}
      queue-capacity: ${LAB_NOTIFICATION_BULKHEAD_QUEUE_CAPACITY:0}
    rate-limiter:
      max-requests-per-minute: ${LAB_RATE_LIMIT_MAX_REQUESTS_PER_MINUTE:5}
      window-ms: ${LAB_RATE_LIMIT_WINDOW_MS:60000}
