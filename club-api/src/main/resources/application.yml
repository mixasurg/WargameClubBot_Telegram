# Конфигурация Spring Boot для club-api.

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clubdb}
    username: ${SPRING_DATASOURCE_USERNAME:club}
    password: ${SPRING_DATASOURCE_PASSWORD:club}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
  jackson:
    time-zone: ${APP_TIMEZONE:Europe/Moscow}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.wargameclub.clubapi.messaging

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  timezone: ${APP_TIMEZONE:Europe/Moscow}
  loyalty:
    points-army-used: ${LOYALTY_POINTS_ARMY_USED:10}
    points-army-shared: ${LOYALTY_POINTS_ARMY_SHARED:5}
  notifications:
    max-attempts: ${NOTIFICATIONS_MAX_ATTEMPTS:5}
    backoff-seconds: ${NOTIFICATIONS_BACKOFF_SECONDS:30}
  analytics:
    file: ${ANALYTICS_FILE:}

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

