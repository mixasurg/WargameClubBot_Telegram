<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wargame Club API</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #0f766e;
            --accent-hover: #115e59;
            --border: #d1d5db;
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top left, #d1fae5 0%, var(--bg) 45%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
        }

        .row {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .secondary {
            background: #111827;
        }

        .secondary:hover {
            background: #1f2937;
        }

        .status {
            margin-top: 14px;
            min-height: 20px;
            font-size: 14px;
        }

        .status.error {
            color: var(--danger);
        }

        .token-box {
            margin-top: 14px;
            background: #f3f4f6;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font-size: 12px;
            word-break: break-all;
            display: none;
        }

        .links {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 13px;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Wargame Club API</h1>
    <p>Вход по логину и паролю (JWT). Для демонстрации можно использовать `admin / admin123`.</p>

    <form id="loginForm">
        <div class="row">
            <label for="login">Логин</label>
            <input id="login" name="login" type="text" minlength="3" maxlength="120" required>
        </div>
        <div class="row">
            <label for="password">Пароль</label>
            <input id="password" name="password" type="password" minlength="6" maxlength="120" required>
        </div>
        <div class="actions">
            <button type="submit">Войти</button>
            <button class="secondary" type="button" id="whoamiBtn">Проверить /api/auth/me</button>
        </div>
    </form>

    <div id="status" class="status"></div>
    <div id="tokenBox" class="token-box"></div>

    <div class="links">
        <a href="/swagger-ui/index.html" target="_blank" rel="noopener">Swagger UI</a>
        <a href="/actuator/health" target="_blank" rel="noopener">Health</a>
    </div>
</main>

<script>
    const statusEl = document.getElementById("status");
    const tokenBoxEl = document.getElementById("tokenBox");
    const formEl = document.getElementById("loginForm");
    const whoamiBtnEl = document.getElementById("whoamiBtn");
    let token = null;

    function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.className = isError ? "status error" : "status";
    }

    function setToken(newToken) {
        token = newToken;
        if (!token) {
            tokenBoxEl.style.display = "none";
            tokenBoxEl.textContent = "";
            return;
        }
        tokenBoxEl.style.display = "block";
        tokenBoxEl.textContent = "JWT: " + token;
    }

    async function login(login, password) {
        const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({login, password})
        });
        const payload = await response.json();
        if (!response.ok) {
            throw new Error(payload.message || payload.error || "Ошибка входа");
        }
        return payload;
    }

    async function getMe() {
        if (!token) {
            throw new Error("Сначала выполните вход");
        }
        const response = await fetch("/api/auth/me", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });
        const payload = await response.json();
        if (!response.ok) {
            throw new Error(payload.message || payload.error || "Ошибка /api/auth/me");
        }
        return payload;
    }

    formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("Выполняется вход...");
        try {
            const loginValue = document.getElementById("login").value.trim();
            const passwordValue = document.getElementById("password").value;
            const auth = await login(loginValue, passwordValue);
            setToken(auth.accessToken);
            setStatus("Успешный вход. Роль: " + (auth.role || "-"));
        } catch (error) {
            setToken(null);
            setStatus(error.message, true);
        }
    });

    whoamiBtnEl.addEventListener("click", async () => {
        setStatus("Запрос /api/auth/me...");
        try {
            const me = await getMe();
            setStatus("Текущий пользователь: " + me.name + " (" + me.login + ", " + me.role + ")");
        } catch (error) {
            setStatus(error.message, true);
        }
    });
</script>
</body>
</html>
