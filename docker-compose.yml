version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clubdb}
      POSTGRES_USER: ${POSTGRES_USER:-club}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-club}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1

  club-api:
    build:
      context: .
      dockerfile: club-api/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-clubdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-club}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-club}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOYALTY_POINTS_ARMY_USED: ${LOYALTY_POINTS_ARMY_USED:-10}
      LOYALTY_POINTS_ARMY_SHARED: ${LOYALTY_POINTS_ARMY_SHARED:-5}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ps -p 1 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  club-bot:
    build:
      context: .
      dockerfile: club-bot/Dockerfile
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://club-api:8080}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-wargameclub_bot}
      BOT_POLL_INTERVAL_SECONDS: ${BOT_POLL_INTERVAL_SECONDS:-10}
    depends_on:
      club-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -p 1 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
