# Конфигурация Spring Boot для club-bot.

bot:
  token: ${TELEGRAM_BOT_TOKEN:}
  username: ${TELEGRAM_BOT_USERNAME:wargameclub_bot}
  poll-interval-seconds: ${BOT_POLL_INTERVAL_SECONDS:10}

api:
  base-url: ${API_BASE_URL:http://localhost:8080}
  api-key: ${API_KEY:}
  login: ${API_LOGIN:club_bot}
  password: ${API_PASSWORD:club_bot_pass}
  auth-refresh-skew-seconds: ${API_AUTH_REFRESH_SKEW_SECONDS:30}

spring:
  main:
    web-application-type: none

logging:
  level:
    com.wargameclub.clubbot: INFO
