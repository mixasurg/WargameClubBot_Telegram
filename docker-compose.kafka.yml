# Production compose for Kafka + club-bot host.

version: "3.9"

services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_SERVER_IP}:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@${KAFKA_SERVER_IP}:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"

  club-bot:
    build:
      context: .
      dockerfile: club-bot/Dockerfile
    environment:
      API_BASE_URL: http://${API_SERVER_IP}:8080
      API_KEY: ${API_KEY:-}
      API_LOGIN: ${API_LOGIN:club_bot}
      API_PASSWORD: ${API_PASSWORD:club_bot_pass}
      API_AUTH_REFRESH_SKEW_SECONDS: ${API_AUTH_REFRESH_SKEW_SECONDS:30}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-wargameclub_bot}
      BOT_POLL_INTERVAL_SECONDS: ${BOT_POLL_INTERVAL_SECONDS:-10}
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx192m -XX:MaxMetaspaceSize=96m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError"
    depends_on:
      kafka:
        condition: service_started
